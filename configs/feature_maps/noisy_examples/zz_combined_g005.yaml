# ZZ feature map com phase damping em DOIS pontos:
#   1) após o feature map (γ=0.01) — modela erro de preparação
#   2) após cada camada do ansatz (γ=0.005) — modela decoerência durante a execução
feature_map:
  type: "zz"
  params:
    reps: 2
    entanglement: "full"
  noise:
    after_feature_map:
      type: phase_damping
      gamma: 0.01
    per_ansatz_layer:
      type: phase_damping
      gamma: 0.005
